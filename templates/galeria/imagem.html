{% extends 'galeria/base.html' %} {% load static %} {% block content %}
<main class="principal">
  {% include 'galeria/partials/_sidebar.html' %}

  <section class="conteudo">
    <section class="imagem">
      <div class="imagem__conteudo">
        <img
          class="imagem__imagem"
          src="{% static 'assets/imagens/galeria/' %}{{ foto.foto_nome }}"
        />
        <div class="imagem__info">
          <div class="imagem__texto">
            <p class="imagem__titulo">
              {{ foto.nome }}
            </p>
            <p class="imagem__descricao">{{ foto.legenda }}</p>
            <p class="imagem__texto">
              {{ foto.descricao }}
            </p>
          </div>
        </div>
      </div>
    </section>
  </section>
</main>

{% endblock %}
